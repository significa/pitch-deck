<section class="slide" data-slide-type="end">
    <div class="half half--left">
        <div class="half__content">
            <div class="end__header">
                <h1 class="end__headline">{{headline}}</h1>
                {{#if body}}
                <p class="end__body">{{body}}</p>
                {{/if}}
            </div>
            <div class="logo__wrapper">
                <div class="logo__inner" style="background: var(--color-amber)">
                    <div class="end__brand-logo--svg end__brand-logo--significa">
                        <svg
                            class="end__significa-mark"
                            viewBox="0 0 24 29"
                            fill="none"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M12 27.887c-6.39 0-11.59-5.04-11.59-11.285C.41 9.563 6.005.614 12 .614c5.995 0 11.591 8.948 11.591 15.988 0 6.245-5.2 11.285-11.59 11.285Zm0-2.573c5.006 0 9.044-3.913 9.044-8.712 0-5.797-4.765-13.415-9.044-13.415-4.279 0-9.043 7.618-9.043 13.415 0 4.8 4.037 8.712 9.043 8.712Z"
                                fill="currentColor"
                            />
                        </svg>
                    </div>
                </div>
            </div>
            <div class="end__footer">
                <div class="end__footer-field">
                    <p class="content__label">Shared at</p>
                    <p class="end__footer-value">{{sharedDate}}</p>
                </div>
                <div class="end__footer-field">
                    <p class="content__label">Created by</p>
                    <p class="end__footer-value">{{partner}}</p>
                </div>
            </div>
        </div>
    </div>
    <div class="half half--right">
        <div class="half__content">
            <div class="logo__wrapper">
                <div class="logo__inner" style="background: {{clientColor}};">
                    {{#if clientLogoSrc}}
                    <img
                        class="end__brand-logo"
                        src="{{clientLogoSrc}}"
                        alt="{{clientName}}"
                    />
                    {{/if}}
                    {{#if clientLogoSvg}}
                    <div class="end__brand-logo--svg">{{clientLogoSvg}}</div>
                    {{/if}}
                    {{#if clientLogoFallback}}
                    <div class="end__brand-fallback">{{clientName}}</div>
                    {{/if}}
                </div>
            </div>
        </div>
    </div>
</section>
