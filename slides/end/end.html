<section class="slide" data-slide-type="end">
    <div class="end__content">
        <div class="end__top">
            <div class="end__header">
                <h1 class="end__headline">{{headline}}</h1>
                {{#if body}}
                <p class="end__body">{{body}}</p>
                {{/if}}
            </div>
            <div class="end__footer">
                <div class="end__footer-field">
                    <p class="content__label">Shared at</p>
                    <p class="end__footer-value">{{sharedDate}}</p>
                </div>
                <div class="end__footer-field">
                    <p class="content__label">Created by</p>
                    <p class="end__footer-value">{{partner}}</p>
                </div>
            </div>
        </div>
        <div class="end__logo">
            {{#if clientLogoSrc}}
            <img
                class="end__logo-img"
                src="{{clientLogoSrc}}"
                alt="{{clientName}}"
            />
            {{/if}} {{#if clientLogoSvg}}
            <div class="end__logo-svg">{{clientLogoSvg}}</div>
            {{/if}} {{#if clientLogoFallback}}
            <p class="end__logo-text">{{clientName}}</p>
            {{/if}}
        </div>
    </div>
</section>
