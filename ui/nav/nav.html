<nav class="deck-nav" aria-label="Slide navigation">
    <button class="deck-nav__toggle" aria-label="Toggle thumbnails" aria-pressed="false">
        <i data-lucide="panel-left"></i>
    </button>
    <div class="deck-nav__divider"></div>
    <button class="deck-nav__prev" aria-label="Previous slide">
        <i data-lucide="chevron-left"></i>
    </button>
    <span class="deck-nav__counter" aria-live="polite">
        <span class="deck-nav__counter-current">1</span>
        <span class="deck-nav__counter-sep">/</span>
        <span class="deck-nav__counter-total"></span>
    </span>
    <button class="deck-nav__next" aria-label="Next slide">
        <i data-lucide="chevron-right"></i>
    </button>
    <div class="deck-nav__divider"></div>
    <button class="deck-nav__reset" aria-label="Reset to first slide">
        Reset <kbd>R</kbd>
    </button>
</nav>
